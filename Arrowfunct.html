    When you have only one parameter for an arrow funct, the round brackets

            console.log(param+=1)
        }

   /*  When an arrow function code is simply a line, then coily brackets

/* 
     When using the return statement in arrow function and still u are only utilizing

/*     Using arrow function in an object is also very wise! But an object already have
