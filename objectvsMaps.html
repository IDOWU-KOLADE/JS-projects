<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>
                // ❌ THE OBJECT WAY (Clunky)
        const userData = { 1: 'Admin', 2: 'Editor' };

        // Getting the size? Not native.
        Object.keys(userData).length; 

        // Iterating? Requires extra steps.
        Object.entries(userData).forEach(([key, value]) => {
        console.log(key, value);
        });

        // ✅ THE MAP WAY (Clean & Fast)
        const userMap = new Map([[1, 'Admin'], [2, 'Editor']]);

        // Getting the size? Built-in property.
        userMap.size; 

        // Iterating? Native and much faster.
        for (const [key, value] of userMap) {
        console.log(key, value);
        }
    </script>
</body>
</html>
