// Note the static method is a method that belongs to the class itself, not even the object in the class, note:

        constructor(name,age,class1,school,position) {
            super(name,age,class1);
            this.school = school;
            this.position = position;
            this.age = age
        }
       set age(value) {

                console.log('Hey, be a bit smarter! age cannot be negative')
                return;
            }else {
              this._age= value
            }
        }
    get age() {
        return this._age;
    }

    static info(category) {
            console.log(`Hey! I am a ${category} class`)
    }
}
