 let myPromise = new Promise((resolve,reject)=> {
    let completed = 1;

    if (completed) {
        resolve('Success!');
    } else {
        reject('Failed!');
    }
 });

 //Little promise play!🤌
 
 let userLeft = true;
 let userDistracted = false;
function monitorUserPromise() {
    return new Promise((resolve,reject)=> {
        if (userLeft) {
           reject({
            name: 'User left',
            result: 'Error'
           })
        }else if (userDistracted) {
            reject({
                name: 'User got distracted',
                result: "Error"
            })
        } else {
            resolve({
                name: 'User successfully registered',
                result: 'Success'
            })
        }
    })
}

monitorUserPromise().then((message)=> {
    console.log(`${message.name}, ${message.result}!`)
}).catch((message)=>{
console.log(`${message.name}, ${message.result}!`)
})

// Complicated promises
function step1() {
    return new Promise(resolve => {
        setTimeout(() => resolve("Step 1 done"), 1000);
    });
}

function step2(previousResult) {
    return new Promise(resolve => {
        setTimeout(() => resolve(previousResult + " → Step 2 done"), 1000);
    });
}

function step3(previousResult) {
    return new Promise(resolve => {
        setTimeout(() => resolve(previousResult + " → Step 3 done"), 1000);
    });
}

        return step3(result);

    .catch(error => {

    }
    function step13 (previousResult) {
        return new Promise((resolve)=> {
