<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button class="starter">Start</button>
    <button class="cart">Add to cart</button>
    <p class="display"></p>

    <h2>Message Buttons</h2>
    <button class="addm">Add</button>
    <button class="removem">Remove</button>
    <script>

        const start_btn = document.querySelector('.starter')
         let is_buttonon = false
         let sessid;
        start_btn.addEventListener('click',()=> {
               clearTimeout(sessid)
            if(!is_buttonon){
                start_btn.disabled=true
                start_btn.innerHTML= 'Loading...'
                sessid = setTimeout(()=>{
                    start_btn.disabled= false
                    start_btn.innerHTML='Finished'
                },2000)     
                
                is_buttonon= true           
            }
            else {
                sessid=setTimeout(()=>{
                    start_btn.innerHTML= 'Start'
                },1000)
                is_buttonon= false
            }
          
        })
    
        const cart_btn = document.querySelector('.cart')
        const displayp = document.querySelector('.display')
        let fessid;
        cart_btn.addEventListener('click',()=>{
            clearTimeout(fessid)
            displayp.innerHTML= 'Added'
            fessid=setTimeout(()=> {
              displayp.innerHTML=''
            },2000)
        })

        const addmessage= document.querySelector('.addm')
        const rmessage = document.querySelector('.removem')

let fetchid;
let i=0;
let change = false;

    function Updatemessage () {

        if (i<0) {
            document.title= 'app'
        }
        else{
            if(!change) {
                document.title= 'app';
            }
            else{
                document.title= `(${i}) New messages`
            }
        }
        change = !change
    }
setInterval(Updatemessage,1000);
    addmessage.addEventListener('click', ()=> {
        i+=1
    })
    rmessage.addEventListener('click', ()=> {
    i-=1
    })
    </script>
</body>
</html>
